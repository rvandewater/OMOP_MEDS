description: |-
  This pipeline extracts raw MEDS events in longitudinal, sparse form from an input dataset meeting select
  criteria and converts them to the flattened MEDS format.

  This pipeline is for the ${etl_metadata.dataset_name} dataset version ${etl_metadata.dataset_version}.

  See the MEDS-Extract documentation for configuration file details.

event_conversion_config_fp: ${oc.env:EVENT_CONVERSION_CONFIG_FP}

input_dir: ${oc.env:PRE_MEDS_DIR}
output_dir: ${oc.env:MEDS_COHORT_DIR}
shards_map_fp: "${output_dir}/metadata/.shards.json"

etl_metadata:
  dataset_name: ${oc.env:DATASET_NAME}
  dataset_version: ${oc.env:DATASET_VERSION}
  pipeline_name: extract

stages:
  - shard_events:
      # Retained from the old stage_configs block for very large OMOP tables.
      row_chunksize: 20000000000
      infer_schema_length: 999999999
  - split_and_shard_subjects:
      # Retained from the old stage_configs block; large deployments override via env.
      n_subjects_per_shard: ${oc.decode:${oc.env:N_SUBJECTS_PER_SHARD, 10000}}
  - convert_to_subject_sharded
  - convert_to_MEDS_events
  - merge_to_MEDS_cohort
  - extract_code_metadata
  - finalize_MEDS_metadata
  - finalize_MEDS_data
