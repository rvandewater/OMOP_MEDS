  observation_period_end:
    code: 'f"{$preferred_vocabulary_name}//{$preferred_concept_name}//end"'
    time: $observation_period_end_date
    table_name: $table_name

drug_exposure:
  drug_exposure:
    code: 'f"{$preferred_vocabulary_name}//{$drug_concept_id}//start"'
