subject_id_col: person_id

person_birth_death:
  death_time:
    code: MEDS_DEATH
    time: $date_of_death
    table_name: $table_name
  age:
    code: MEDS_BIRTH
    time: $date_of_birth
    table_name: $table_name
  gender:
    code: 'f"GENDER//{$gender}"'
    time: null
    table_name: $table_name

person:
  race:
    code: 'f"RACE//{$race_concept_id}"'
    time: null
    table_name: $table_name
  ethnicity:
    code: 'f"ETHNICITY//{$ethnicity_concept_id}"'
    time: null
    table_name: $table_name

observation:
  observation:
    code: 'f"{$preferred_vocabulary_name}//{$preferred_concept_name}"'
    time: $observation_datetime
    numeric_value: $value_as_number
    unit: $unit_concept_id
    text_value: $value_as_string
    visit_occurrence_id: $visit_occurrence_id
    table_name: $table_name

measurement:
  measurement:
    code: 'f"{$preferred_vocabulary_name}//{$preferred_concept_name}"'
    time: $measurement_datetime
    numeric_value: $value_as_number
    unit: $unit_concept_id
    visit_occurrence_id: $visit_occurrence_id
    table_name: $table_name

visit_occurrence:
  visit:
    code: 'f"{$preferred_vocabulary_name}//{$preferred_concept_name}//start"'
    time: $visit_start_datetime
    visit_occurrence_id: $visit_occurrence_id
    text_value: $care_site_name
    table_name: $table_name
  visit_end:
    code: 'f"{$preferred_vocabulary_name}//{$preferred_concept_name}//end"'
    time: $visit_end_datetime
    visit_occurrence_id: $visit_occurrence_id
    table_name: $table_name

observation_period:
  observation_period:
    code: 'f"{$preferred_vocabulary_name}//{$preferred_concept_name}//start"'
    time: $observation_period_start_date
